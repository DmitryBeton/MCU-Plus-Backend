{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Главная | MCU Plus</title>
    <link rel="stylesheet" href="{% static 'css/site.css' %}">
</head>
<body>
    <main class="empty-page">
        <section class="empty-state" aria-labelledby="home-title">
            <p class="eyebrow">MCU Plus</p>
            <h1 id="home-title">Пустая страница</h1>
            <p>Вы вошли в аккаунт. Здесь позже появится содержимое сайта.</p>

            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="secondary-button">Выйти</button>
            </form>
        </section>
    </main>
</body>
</html>
